run:
  run_id: "real_10k_company_panel_nasdaq_sharadar_2016_2025"
  run_type: "exploratory_run"
  random_seed: 42
  output_dir: "runs/text_factor_lab/real_10k_company_panel_nasdaq_sharadar_2016_2025"

inputs:
  document_manifest_path: "data_private/sec/document_manifest.jsonl"
  prices_path: "data_private/sharadar/prices_with_returns.csv"
  parsed_sections_path: "data_private/sec/parsed_sections.jsonl"
  raw_filings_dir: "data_private/sec/raw_filings"
  copy_inputs_to_run_dir: true

data_provider:
  market_data_provider: "nasdaq_sharadar"
  filing_provider: "sec_edgar"
  price_source: "nasdaq_sharadar_sep_adjusted_close"
  return_source: "nasdaq_sharadar_sep_simple_return"
  delisting_return_source: "sharadar_delisted_metadata_no_crsp_dlret"
  link_source: "nasdaq_sharadar_tickers_cik_mapping"
  allow_public_yahoo_fallback: false
  sharadar_prices_file: "data_private/sharadar/prices_with_returns.csv"
  sharadar_tickers_file: "data_private/sharadar/tickers_raw.csv"
  sharadar_actions_file: "data_private/sharadar/actions_raw.csv"
  data_license_manifest_file: "data_manifests/nasdaq_sharadar_data_manifest.template.json"

universe:
  name: "selected_company_panel_nasdaq_sharadar"
  selection_date: "2016-01-01"
  tickers_file: "data_private/universe_sharadar/tickers.csv"
  security_master_file: "data_private/universe_sharadar/security_master.csv"
  membership_file: "data_private/universe_sharadar/universe_membership.csv"
  entity_link_history_file: "data_private/universe_sharadar/entity_link_history.csv"
  universe_data_level: "applied"
  survivorship_bias_control: false
  allow_delisted_firms: true
  historical_ticker_mapping: true

sample:
  start_date: "2016-01-01"
  end_date: "2025-12-31"
  timezone: "America/New_York"

text_source:
  document_type: "10-K"
  source: "SEC_EDGAR"
  sections:
    - "Risk Factors"
    - "MD&A"
    - "Business"
    - "Legal Proceedings"
  require_available_time: true
  require_license_note: true
  sec_user_agent: "financial-10k-text-agent contact: replace-with-email@example.com"

labels:
  targets:
    - "realized_volatility_1_20"
    - "CAR_1_5"
    - "CAR_1_20"
  return_type: "log"
  portfolio_return_type: "simple"
  price_field: "ret"
  market_benchmark: "SPY"
  annualization_days: 252

split:
  method: "rolling_year"
  train_years_min: 5
  validation_years: 1
  test_years: 1
  embargo_days: 20

features:
  methods:
    - "dictionary_tone"
    - "tfidf"
  dictionary_tone:
    dictionaries:
      - "loughran_mcdonald"
      - "risk_uncertainty"
  tfidf:
    max_features: 50000
    ngram_range: [1, 2]
    min_df: 5
    max_df: 0.95
    fit_scope: "train_window_only"
    write_long_features: false
    matrix_store_dir: "feature_matrices"
    matrix_index_file: "feature_matrix_index.json"
    svd_components: 64

models:
  enabled:
    - "historical_mean"
    - "industry_mean"
    - "ridge"
    - "xgboost"
  tuning:
    selection_metric: "validation_rank_ic"
    save_tuning_log: true

backtest:
  rebalance_frequency: "monthly"
  portfolio_method: "top_bottom_quintile"
  weighting: "equal_weight"
  holding_window_days: 20
  transaction_cost_bps_one_way: 10
  sector_neutral: true
  newey_west_lag: 19
  portfolio_signal_direction: "validation_selected"
  target_aware_portfolio_policy: "risk_scaled"

audit:
  coverage_threshold: 0.8
  require_license_note: true
  require_available_time: true
  reject_on_lookahead: true
  reject_on_train_test_leakage: true
